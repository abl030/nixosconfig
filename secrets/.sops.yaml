---
# Least-privilege recipient model (#234). Every secret is encrypted to its
# consuming host key(s) plus two universal keys:
#   editor      age17uw7…  warm, doc1-only (~/.config/sops/age/keys.txt)
#   break-glass age1y6na…  cold, off-box (Bitwarden + printed) — recovery only
# Layout IS scope: a secret under hosts/<H>/ is decryptable only by host <H>
# (+ the two universal keys). The fail-closed `.*` fallback means a new,
# unscoped secret deploys NOWHERE until it gets a rule. Enforced by the
# sopsRecipientScopeCheck flake check. Recovery: docs/wiki/infrastructure/
# sops-break-glass-recovery.md. path_regex is relative to this file.
creation_rules:
  # ---- Per-host: hosts/<H>/* → that host's key + editor + break-glass ----
  - path_regex: ^hosts/proxmox-vm/
    key_groups:
      - age:
          - age1y4sdqs8dnlrma395hjna6dmzcctaeqpr8rh0wx6ap626uv0mremqsgdn30 # doc1 (proxmox-vm host key)
          - &editor age17uw7vxe8x3nmg0lu5j33qlh8pxr538jlqhhjngmexdc0macccg8sc8rw63 # editor (doc1)
          - &breakglass age1y6nasu9gplutapjne4yv0uhzrwee6ayf2mygwhphf3nty6x5xddqy4zl4h # break-glass
  - path_regex: ^hosts/doc2/
    key_groups:
      - age:
          - age1w09y86s3rtp8f06rfrwx865p9nrxsklhlsf03qsqmrlpcudleplq26xujh # doc2
          - *editor
          - *breakglass
  - path_regex: ^hosts/igpu/
    key_groups:
      - age:
          - age17pejn8m9tz063y3waahgyyn365n22hzgg5hr64ey7wk79ee8ccmsh8z294 # igpu
          - *editor
          - *breakglass
  - path_regex: ^hosts/epimetheus/
    key_groups:
      - age:
          - age1gr4papzzdqfxd34ushr88303f2ypdwvgx9cw2xqs87yn4zf8lpxqc0rur5 # epi
          - *editor
          - *breakglass
  - path_regex: ^hosts/framework/
    key_groups:
      - age:
          - age1ysfdznu87vwwqtpudchkyx0wlhuhteqljrqkt6963pcmhwprlgcqasg0gv # framework
          - *editor
          - *breakglass
  - path_regex: ^hosts/wsl/
    key_groups:
      - age:
          - age10hqxw3uxvg9nkc56rm495ty0rge0yhkcqp95gx00tgsv8ptg93mqwywlja # wsl
          - *editor
          - *breakglass
  - path_regex: ^hosts/cache/
    key_groups:
      - age:
          - age1cd4wnte9ffe65ysqzvtkwu5uzvvxn9xeln7n5ctkjsk4c589fc5qkt397e # cache
          - *editor
          - *breakglass
  - path_regex: ^hosts/hermes/
    key_groups:
      - age:
          - age1a2gezkcxar2ss9zksys4ej4qlxa4uj32zyctycew364jw2fj5veq00a3v0 # hermes
          - *editor
          - *breakglass

  # ---- Multi-host: acme DNS-01 token (nginx on doc1; tailscale-share on
  #      doc2/overseerr + doc2/abs + igpu/jellyfin; nginx via cullen-dashboard on wsl) ----
  - path_regex: ^acme-cloudflare\.env$
    key_groups:
      - age:
          - age1y4sdqs8dnlrma395hjna6dmzcctaeqpr8rh0wx6ap626uv0mremqsgdn30 # doc1
          - age1w09y86s3rtp8f06rfrwx865p9nrxsklhlsf03qsqmrlpcudleplq26xujh # doc2
          - age17pejn8m9tz063y3waahgyyn365n22hzgg5hr64ey7wk79ee8ccmsh8z294 # igpu
          - age10hqxw3uxvg9nkc56rm495ty0rge0yhkcqp95gx00tgsv8ptg93mqwywlja # wsl
          - *editor
          - *breakglass

  # ---- Multi-host: uptime-kuma monitoring creds (server auth + client API
  #      key), consumed by every monitor-running host: doc1, doc2, igpu ----
  - path_regex: ^uptime-kuma(-api)?\.env$
    key_groups:
      - age:
          - age1y4sdqs8dnlrma395hjna6dmzcctaeqpr8rh0wx6ap626uv0mremqsgdn30 # doc1
          - age1w09y86s3rtp8f06rfrwx865p9nrxsklhlsf03qsqmrlpcudleplq26xujh # doc2
          - age17pejn8m9tz063y3waahgyyn365n22hzgg5hr64ey7wk79ee8ccmsh8z294 # igpu
          - *editor
          - *breakglass

  # ---- Fleet-wide: base-profile secrets every live host consumes ----
  - path_regex: ^(nix-netrc|atuin-session|atuin-key|gotify\.env)$
    key_groups:
      - age:
          - age1y4sdqs8dnlrma395hjna6dmzcctaeqpr8rh0wx6ap626uv0mremqsgdn30 # doc1
          - age1w09y86s3rtp8f06rfrwx865p9nrxsklhlsf03qsqmrlpcudleplq26xujh # doc2
          - age17pejn8m9tz063y3waahgyyn365n22hzgg5hr64ey7wk79ee8ccmsh8z294 # igpu
          - age1gr4papzzdqfxd34ushr88303f2ypdwvgx9cw2xqs87yn4zf8lpxqc0rur5 # epi
          - age1ysfdznu87vwwqtpudchkyx0wlhuhteqljrqkt6963pcmhwprlgcqasg0gv # framework
          - age10hqxw3uxvg9nkc56rm495ty0rge0yhkcqp95gx00tgsv8ptg93mqwywlja # wsl
          - age1cd4wnte9ffe65ysqzvtkwu5uzvvxn9xeln7n5ctkjsk4c589fc5qkt397e # cache
          - age1a2gezkcxar2ss9zksys4ej4qlxa4uj32zyctycew364jw2fj5veq00a3v0 # hermes
          - *editor
          - *breakglass

  # ---- Fail-closed fallback: editor + break-glass only. Anything not matched
  #      above deploys to NO host until it gets an explicit rule. ----
  - path_regex: .*
    key_groups:
      - age:
          - *editor
          - *breakglass
