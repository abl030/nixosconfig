---
# Recipient model (#234). Every secret is encrypted to its consuming host key(s)
# plus two universal keys:
#   editor      age17uw7…  warm, doc1-only (~/.config/sops/age/keys.txt) — edits any secret
#   break-glass age1y6na…  cold, off-box (Bitwarden + printed) — recovery only, on no host
# Retired here: the fleet-key-as-master recipient (age1d30), the old shared
# "Proxmox VM and IGPU" editor key (age1wnxn), and the decommissioned dev +
# sandbox host keys. Per-host-dir globs (^hosts/<H>/.*) + a fail-closed fallback
# land in PR3. path_regex is relative to this file's location.
creation_rules:
  - path_regex: hosts/doc2/musicbrainz-pgpass\.env$
    key_groups:
      - age:
          - age1w09y86s3rtp8f06rfrwx865p9nrxsklhlsf03qsqmrlpcudleplq26xujh # doc2
          - age17uw7vxe8x3nmg0lu5j33qlh8pxr538jlqhhjngmexdc0macccg8sc8rw63 # editor (doc1)
          - age1y6nasu9gplutapjne4yv0uhzrwee6ayf2mygwhphf3nty6x5xddqy4zl4h # break-glass

  # syncoid-pfsense SSH private key: doc2-only (least privilege). The key
  # grants connect-then-run-zfs-or-echo against pfSense via the forced-command
  # wrapper. No other fleet host should need it.
  - path_regex: hosts/doc2/syncoid-pfsense-key$
    key_groups:
      - age:
          - age1w09y86s3rtp8f06rfrwx865p9nrxsklhlsf03qsqmrlpcudleplq26xujh # doc2
          - age17uw7vxe8x3nmg0lu5j33qlh8pxr538jlqhhjngmexdc0macccg8sc8rw63 # editor (doc1)
          - age1y6nasu9gplutapjne4yv0uhzrwee6ayf2mygwhphf3nty6x5xddqy4zl4h # break-glass

  # gwm-archiver convert-trigger SSH private key: doc2-only (least privilege).
  # Forced-command-locked on epi (marker-convert.nix) to ONLY start
  # marker-convert.service — worthless to an attacker even if it leaks. See #270.
  - path_regex: hosts/doc2/gwm-trigger-key$
    key_groups:
      - age:
          - age1w09y86s3rtp8f06rfrwx865p9nrxsklhlsf03qsqmrlpcudleplq26xujh # doc2
          - age17uw7vxe8x3nmg0lu5j33qlh8pxr538jlqhhjngmexdc0macccg8sc8rw63 # editor (doc1)
          - age1y6nasu9gplutapjne4yv0uhzrwee6ayf2mygwhphf3nty6x5xddqy4zl4h # break-glass

  # Fleet SSH identity (ssh_key_abl030): doc1-only. The bastion is the sole
  # holder (deployIdentity = true); siblings are keyless. See #234, #270.
  - path_regex: hosts/proxmox-vm/ssh_key_abl030$
    key_groups:
      - age:
          - age1y4sdqs8dnlrma395hjna6dmzcctaeqpr8rh0wx6ap626uv0mremqsgdn30 # doc1 (proxmox-vm host key)
          - age17uw7vxe8x3nmg0lu5j33qlh8pxr538jlqhhjngmexdc0macccg8sc8rw63 # editor (doc1)
          - age1y6nasu9gplutapjne4yv0uhzrwee6ayf2mygwhphf3nty6x5xddqy4zl4h # break-glass

  # Interim fleet-wide fallback (PR1): the 7 live host keys + the two universal
  # keys. PR3 replaces this with per-host-dir globs and a fail-closed
  # (editor + break-glass only) fallback.
  - path_regex: .*
    key_groups:
      - age:
          - age1y4sdqs8dnlrma395hjna6dmzcctaeqpr8rh0wx6ap626uv0mremqsgdn30 # doc1 (proxmox-vm host key)
          - age1gr4papzzdqfxd34ushr88303f2ypdwvgx9cw2xqs87yn4zf8lpxqc0rur5 # epi
          - age17pejn8m9tz063y3waahgyyn365n22hzgg5hr64ey7wk79ee8ccmsh8z294 # igpu
          - age1ysfdznu87vwwqtpudchkyx0wlhuhteqljrqkt6963pcmhwprlgcqasg0gv # framework
          - age10hqxw3uxvg9nkc56rm495ty0rge0yhkcqp95gx00tgsv8ptg93mqwywlja # wsl
          - age1cd4wnte9ffe65ysqzvtkwu5uzvvxn9xeln7n5ctkjsk4c589fc5qkt397e # cache
          - age1w09y86s3rtp8f06rfrwx865p9nrxsklhlsf03qsqmrlpcudleplq26xujh # doc2
          - age17uw7vxe8x3nmg0lu5j33qlh8pxr538jlqhhjngmexdc0macccg8sc8rw63 # editor (doc1)
          - age1y6nasu9gplutapjne4yv0uhzrwee6ayf2mygwhphf3nty6x5xddqy4zl4h # break-glass
