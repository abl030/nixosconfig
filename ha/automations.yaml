- id: '1722839354487'
  alias: Amp_Casting_On
  description: Turn amp on via IR blaster when kitchen cast group or andys cast starts
    playing
  triggers:
  - platform: state
    entity_id:
    - media_player.kitchen
    - media_player.andys_cast
    to: playing
  conditions: []
  actions:
  - action: mqtt.publish
    data:
      qos: '0'
      retain: false
      topic: zigbee2mqtt/IR_Blaster/set
      payload: '{"ir_code_to_send": "A4YDGwPAAwMAB4YD4AEBA0cRhgNAAYAVgAXgCwFAGQ///4YDhgOGA4YDhgOGAxsD"}'
  mode: restart
- id: '1722840136733'
  alias: Amp_Casting_IdleOFF
  description: Turn amp off via IR blaster when kitchen cast group or andys cast goes
    idle for 3s
  triggers:
  - platform: state
    entity_id:
    - media_player.kitchen
    - media_player.andys_cast
    to: idle
    for:
      seconds: 3
  conditions:
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.kitchen
      state: playing
    - condition: state
      entity_id: media_player.andys_cast
      state: playing
  actions:
  - action: mqtt.publish
    data:
      qos: '0'
      retain: false
      topic: zigbee2mqtt/IR_Blaster/set
      payload: '{"ir_code_to_send": "BYADgAP9BkABAYAD4AEBA0sRgANAAYAVgAXgBwEL/Qb9Bv//gAOAA/0GQAEBgAPgAQHgXD8CBv0G"}'
  mode: restart
