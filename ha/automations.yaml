- id: '1770341381298'
  alias: Daily Low Battery Digest
  description: Send a daily Gotify notification listing all devices with batteries
    below 15%
  triggers:
  - platform: time
    at: '17:00:00'
  conditions: []
  actions:
  - variables:
      low_batteries: '{% set ns = namespace(items=[]) %}{% for entity in states.sensor
        | selectattr(''attributes.device_class'', ''defined'') | selectattr(''attributes.device_class'',
        ''eq'', ''battery'') %}{% if entity.state not in [''unknown'', ''unavailable'']
        and entity.state | float(100) < 15 %}{% set ns.items = ns.items + [entity.name]
        %}{% endif %}{% endfor %}{{ ns.items }}'
  - condition: template
    value_template: '{{ low_batteries | length > 0 }}'
  - data:
      title: "\U0001F50B Low Battery Alert"
      message: 'The following devices need battery replacement:


        {% for battery in low_batteries %}• {{ battery }}

        {% endfor %}'
    action: notify.gotify_battery
  mode: single
- id: '1770342766452'
  alias: Wine Fridge Temperature Alert
  description: Alert via Gotify when any wine fridge (except broken north) exceeds
    20°C
  triggers:
  - platform: numeric_state
    entity_id: sensor.sensor_wine_fridge_south_temperature
    above: 20
  - platform: numeric_state
    entity_id: sensor.sensor_wine_fridge_centre_temperature
    above: 20
  - platform: numeric_state
    entity_id: sensor.sensor_wine_fridge_garage_west_temperature
    above: 20
  - platform: numeric_state
    entity_id: sensor.sensor_wine_fridge_garage_east_temperature
    above: 20
  actions:
  - data:
      title: "\U0001F377 Wine Fridge Too Warm!"
      message: '{{ trigger.to_state.name }} is at {{ trigger.to_state.state }}°C -
        above 20°C threshold!'
    action: notify.gotify_battery
  mode: parallel
  max: 4
- id: '1772186549605'
  alias: Garage Door State Change Alert
  description: Notify via Gotify when the garage door opens or closes, at most once
    per 10 minutes
  triggers:
  - platform: state
    entity_id: binary_sensor.garage_door_tilt_contact
    not_from:
    - unavailable
    - unknown
    not_to:
    - unavailable
    - unknown
  conditions:
  - condition: template
    value_template: '{{ this.attributes.last_triggered is none or (now() - this.attributes.last_triggered).total_seconds()
      > 600 }}'
  actions:
  - action: notify.gotify_battery
    data:
      title: "\U0001F697 Garage Door"
      message: Garage door is now {{ 'open' if trigger.to_state.state == 'on' else
        'closed' }}
  mode: single
