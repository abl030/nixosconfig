# Overview Dashboard
# url_path: default
# title: Overview

views:
- path: default_view
  title: Home
  cards:
  - type: tile
    entity: binary_sensor.garage_door_tilt_contact
    name: Garage Door
    icon: mdi:garage
    tap_action:
      action: perform-action
      perform_action: switch.turn_on
      target:
        entity_id: switch.garage_door
  - type: tile
    entity: sensor.garage_door_tilt_battery
    name: Garage Door Battery
    icon: mdi:battery
  - type: tile
    entity: climate.living_room_aircon
    name: Living Room Aircon
    icon: mdi:air-conditioner
    features:
    - type: climate-hvac-modes
      hvac_modes:
      - cool
      - heat
      - fan_only
      - dry
      - "off"
    - type: target-temperature
  - type: tile
    entity: media_player.kitchen
    name: Kitchen
    icon: mdi:speaker
    features:
    - type: media-player-playback
    - type: media-player-volume-slider
  - type: "custom:rtrfm-now-playing-card"
    url: https://rtrfm.ablz.au/now-playing
    refresh_seconds: 90
  - type: button
    name: Play RTRFM
    icon: mdi:radio
    tap_action:
      action: perform-action
      perform_action: media_player.play_media
      data:
        entity_id: media_player.kitchen
        media_content_id: https://live.rtrfm.com.au/stream1
        media_content_type: audio/mp3
