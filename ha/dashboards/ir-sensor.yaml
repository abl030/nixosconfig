# IR Sensor Dashboard
# url_path: ir-sensor
# title: IR Sensor

views:
- path: default_view
  title: Home
  cards:
  - type: entities
    entities:
    - person.andy_barrett_lennard
  - type: weather-forecast
    show_current: true
    show_forecast: false
    entity: weather.forecast_home
    forecast_type: daily
    secondary_info_attribute: precipitation_today
  - type: entities
    entities:
    - entity: sensor.sensor_wine_fridge_garage_west_temperature
    - entity: sensor.sensor_wine_fridge_garage_east_temperature
    - entity: sensor.sensor_wine_fridge_south_temperature
    - entity: sensor.sensor_wine_fridge_centre_temperature
    - entity: sensor.sensor_wine_fridge_north_temperature
  - type: weather-forecast
    show_current: true
    show_forecast: false
    entity: weather.imarga43
    forecast_type: daily
    secondary_info_attribute: preciptotal
  - type: entities
    entities:
    - entity: sensor.imarga43_precipitation_today
    - entity: sensor.imarga43_temperature
    - entity: sensor.imarga43_relative_humidity
    - entity: sensor.imarga43_dewpoint
  - type: entities
    entities:
    - entity: sensor.sensor_masterbedroom_humidity
    - entity: sensor.sensor_masterbedroom_temperature
  - title: History
    type: history-graph
    hours_to_show: 15
    entities:
    - sensor.stp_25_50_grid_power_2
    - sensor.stp_25_50_grid_power
    - sensor.stp_25_50_grid_power_3_warehouse
    - sensor.stp_25_50_pv_gen_meter_3_warehouse
    - sensor.stp_25_50_pv_gen_meter_2_bankb
    - sensor.stp_25_50_pv_gen_meter
  badges:
  - type: entity
    show_name: false
    show_state: true
    show_icon: true
    entity: sensor.imarga43_temperature
  - type: entity
    show_name: false
    show_state: true
    show_icon: true
    entity: sensor.sun_next_dawn
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: sensor.sensor_masterbedroom_temperature
- title: Dental Hub
  path: dental-hub
  icon: mdi:toothbrush-electric
  cards:
  - type: horizontal-stack
    cards:
    - type: vertical-stack
      cards:
      - type: markdown
        content: '## 🦷 Andy''s Brushing Stats'
      - type: horizontal-stack
        cards:
        - type: gauge
          entity: input_number.daily_brush_events_andy
          name: Events Today
          min: 0
          max: 2
          severity:
            red: 0
            yellow: 1
            green: 2
        - type: gauge
          entity: input_number.daily_brush_time_andy
          name: Time Today
          unit: s
          min: 0
          max: 240
          severity:
            red: 0
            yellow: 120
            green: 240
      - type: entities
        title: Stats Breakdown
        show_header_toggle: false
        entities:
        - type: section
          label: Today
        - entity: sensor.andy_formatted_daily_brush_time
          name: Total Time Today
        - entity: sensor.io_series_6_7_528e_duration
          name: Current Session
          icon: mdi:timer-sync-outline
        - entity: sensor.andy_yesterday_s_brush_events
          name: Yesterday's Events
        - type: section
          label: This Month
        - entity: sensor.andy_brushing_units_monthly
          name: Monthly Events
          icon: mdi:counter
        - entity: sensor.andy_brush_time_monthly
          name: Monthly Time
          icon: mdi:clock-outline
        - type: section
          label: Long-Term
        - entity: sensor.andy_brush_time_yearly
          name: Yearly Time
          icon: mdi:calendar-star
        - entity: sensor.andy_all_time_brush_time_display
          name: All-Time Total
          icon: mdi:trophy
        - entity: sensor.andy_average_daily_brush_time_long_term
          name: Avg Daily Time (Long Term)
          icon: mdi:chart-line
      - type: entities
        title: Bedtime
        show_header_toggle: false
        entities:
        - entity: sensor.andy_bedtime_hour_daily
          name: Last Night
        - entity: sensor.andy_bedtime_hour_avg_30d
          name: 30-Day Avg
        - entity: sensor.andy_bedtime_hour_avg_all_time
          name: All-Time Avg
    - type: vertical-stack
      cards:
      - type: markdown
        content: '## 🪥 Meg''s Brushing Stats'
      - type: horizontal-stack
        cards:
        - type: gauge
          entity: input_number.daily_brush_events_meg
          name: Events Today
          min: 0
          max: 2
          severity:
            red: 0
            yellow: 1
            green: 2
        - type: gauge
          entity: input_number.daily_brush_time_meg
          name: Time Today
          unit: s
          min: 0
          max: 240
          severity:
            red: 0
            yellow: 120
            green: 240
      - type: entities
        title: Stats Breakdown
        show_header_toggle: false
        entities:
        - type: section
          label: Today
        - entity: sensor.meg_formatted_daily_brush_time
          name: Total Time Today
        - entity: sensor.io_series_6_7_d704_duration
          name: Current Session
          icon: mdi:timer-sync-outline
        - entity: sensor.meg_yesterday_s_brush_events
          name: Yesterday's Events
        - type: section
          label: This Month
        - entity: sensor.meg_brushing_units_monthly
          name: Monthly Events
          icon: mdi:counter
        - entity: sensor.meg_brush_time_monthly
          name: Monthly Time
          icon: mdi:clock-outline
        - type: section
          label: Long-Term
        - entity: sensor.meg_brush_time_yearly
          name: Yearly Time
          icon: mdi:calendar-star
        - entity: sensor.meg_all_time_brush_time_display
          name: All-Time Total
          icon: mdi:trophy
        - entity: sensor.meg_average_daily_brush_time_long_term
          name: Avg Daily Time (Long Term)
          icon: mdi:chart-line
      - type: entities
        title: Bedtime
        show_header_toggle: false
        entities:
        - entity: sensor.meg_bedtime_hour_daily
          name: Last Night
        - entity: sensor.meg_bedtime_hour_avg_30d
          name: 30-Day Avg
        - entity: sensor.meg_bedtime_hour_avg_all_time
          name: All-Time Avg
- title: Overview
  path: overview
  icon: mdi:home-lightning-bolt
  panel: false
  cards:
  # ===== §1. Current Plan — This Month / Year =====
  - type: vertical-stack
    cards:
    - type: markdown
      content: '## ⚡ Business Flexi Plus + Synergy Sellback'
    - type: horizontal-stack
      cards:
      - type: entity
        entity: sensor.monthly_net_cost
        name: Cost This Month
        icon: mdi:calendar-cash
      - type: entity
        entity: sensor.yearly_net_cost
        name: Cost This Year
        icon: mdi:calendar-cash
    - type: horizontal-stack
      cards:
      - type: entity
        entity: sensor.monthly_solar_savings
        name: Solar Saved (Month)
        icon: mdi:cash-plus
      - type: entity
        entity: sensor.yearly_solar_savings
        name: Solar Saved (Year)
        icon: mdi:cash-plus
    - type: entities
      title: Natural Power Surcharge
      show_header_toggle: false
      entities:
      - entity: sensor.monthly_natural_power_surcharge
        name: This Month
        icon: mdi:leaf
      - entity: sensor.yearly_natural_power_surcharge
        name: This Year
        icon: mdi:calendar-leaf

  # ===== §2. Solar ROI =====
  - type: vertical-stack
    cards:
    - type: markdown
      content: '## ☀️ Solar ROI — $91k installed 2024-03-03'
    - type: gauge
      entity: sensor.solar_roi_progress
      name: ROI Progress
      unit: '%'
      min: 0
      max: 100
      severity:
        red: 0
        yellow: 50
        green: 100
    - type: entities
      title: Cumulative Savings
      show_header_toggle: false
      entities:
      - entity: sensor.solar_cumulative_savings
        name: Total to Date
        icon: mdi:cash-multiple
      - type: attribute
        entity: sensor.solar_cumulative_savings
        attribute: measured
        name: ↳ Measured
        icon: mdi:check-circle
      - type: attribute
        entity: sensor.solar_cumulative_savings
        attribute: estimated_pre_deploy
        name: ↳ Estimated (pre-deploy)
        icon: mdi:approximately-equal
      - entity: sensor.days_since_solar_install
        name: Days Since Install
        icon: mdi:calendar-clock
      - entity: sensor.solar_avg_daily_savings_lifetime
        name: Avg Daily Savings (Measured)
        icon: mdi:chart-bell-curve
    - type: conditional
      conditions:
      - entity: sensor.solar_roi_status
        state: projecting
      card:
        type: entities
        title: Projection
        show_header_toggle: false
        entities:
        - entity: sensor.solar_estimated_roi_date
          name: Estimated ROI Date
          icon: mdi:calendar-end
    - type: conditional
      conditions:
      - entity: sensor.solar_roi_status
        state: achieved
      card:
        type: entities
        title: Profit Era
        show_header_toggle: false
        entities:
        - entity: input_datetime.solar_roi_achieved_date
          name: 🎉 ROI Achieved
          icon: mdi:flag-checkered
        - entity: sensor.solar_actual_savings_since_roi
          name: Actual Profit Since ROI
          icon: mdi:cash-plus

  # ===== §3. 140kWh Battery Sweet Spot + ROI + Apex chart (all sizes) =====
  - type: vertical-stack
    cards:
    - type: markdown
      content: '## 🔋 140kWh Battery — Sweet Spot'
    - type: horizontal-stack
      cards:
      - type: entity
        entity: sensor.potential_monthly_savings_140kwh
        name: Would Save (Month)
        icon: mdi:calendar-cash
      - type: entity
        entity: sensor.potential_yearly_savings_140kwh
        name: Would Save (Year)
        icon: mdi:calendar-star
    - type: markdown
      content: |
        ### 💰 Hypothetical ROI (if installed today)
        - **Install cost assumed**: $140,000
        - **Projected annual savings**: ${{ states('input_number.battery_140kwh_projected_annual_savings') | float(0) | round(0) }} (12-mo LTS avg)
        - **Years to ROI**: {{ states('sensor.battery_140kwh_years_to_roi') }} years
        - **ROI date**: {{ states('sensor.battery_140kwh_roi_date') }}
    - type: markdown
      content: '### 📊 All Sizes — SoC Now'
    - type: custom:apexcharts-card
      chart_type: radialBar
      header:
        title: Battery SoC (% Full)
        show: true
      series:
      - entity: sensor.virtual_battery_soc_200kwh_display
        name: 200kWh
        max: 200000
        color: '#4CAF50'
      - entity: sensor.virtual_battery_soc_190kwh_display
        name: 190kWh
        max: 190000
        color: '#4CAF50'
      - entity: sensor.virtual_battery_soc_180kwh_display
        name: 180kWh
        max: 180000
        color: '#4CAF50'
      - entity: sensor.virtual_battery_soc_170kwh_display
        name: 170kWh
        max: 170000
        color: '#4CAF50'
      - entity: sensor.virtual_battery_soc_160kwh_display
        name: 160kWh
        max: 160000
        color: '#4CAF50'
      - entity: sensor.virtual_battery_soc_150kwh_display
        name: 150kWh
        max: 150000
        color: '#4CAF50'
      - entity: sensor.virtual_battery_soc_140kwh_display
        name: 140kWh
        max: 140000
        color: '#4CAF50'
      - entity: sensor.virtual_battery_soc_130kwh_display
        name: 130kWh
        max: 130000
        color: '#4CAF50'
      - entity: sensor.virtual_battery_soc_120kwh_display
        name: 120kWh
        max: 120000
        color: '#4CAF50'
      - entity: sensor.virtual_battery_soc_110kwh_display
        name: 110kWh
        max: 110000
        color: '#4CAF50'
      - entity: sensor.virtual_battery_soc_100kwh_display
        name: 100kWh
        max: 100000
        color: '#4CAF50'
      - entity: sensor.virtual_battery_soc_90kwh_display
        name: 90kWh
        max: 90000
        color: '#4CAF50'
      - entity: sensor.virtual_battery_soc_80kwh_display
        name: 80kWh
        max: 80000
        color: '#4CAF50'
      - entity: sensor.virtual_battery_soc_70kwh_display
        name: 70kWh
        max: 70000
        color: '#4CAF50'
      - entity: sensor.virtual_battery_soc_60kwh_display
        name: 60kWh
        max: 60000
        color: '#4CAF50'
      - entity: sensor.virtual_battery_soc_50kwh_display
        name: 50kWh
        max: 50000
        color: '#4CAF50'

  # ===== §4. Plan Comparison =====
  # Shows the delta BF - BFPlus. Positive = BFPlus is the cheaper plan (good,
  # staying put saves money). Negative = BF would be cheaper (bad, consider
  # switching). Coloured red when negative for instant visual signal.
  - type: vertical-stack
    cards:
    - type: markdown
      content: |
        ## 🔄 BFPlus vs Business Flexi
        *Negative = BF would be cheaper (red).  Positive = BFPlus saving you money.*
    - type: markdown
      content: |
        {% set m = states('sensor.bfplus_advantage_monthly') | float(0) %}
        {% set y = states('sensor.bfplus_advantage_yearly') | float(0) %}
        ### This Month
        <span style="color: {% if m < 0 %}#e74c3c{% else %}#2ecc71{% endif %}; font-size: 1.6em; font-weight: bold;">
        {% if m < 0 %}-${{ (m | abs) | round(2) }} (BF cheaper){% else %}+${{ m | round(2) }} (BFPlus winning){% endif %}
        </span>

        BFPlus: ${{ states('sensor.monthly_net_cost') | float(0) | round(2) }} • BF: ${{ states('sensor.business_flexi_monthly_cost') | float(0) | round(2) }}

        ### This Year (YTD)
        <span style="color: {% if y < 0 %}#e74c3c{% else %}#2ecc71{% endif %}; font-size: 1.6em; font-weight: bold;">
        {% if y < 0 %}-${{ (y | abs) | round(2) }} (BF cheaper){% else %}+${{ y | round(2) }} (BFPlus winning){% endif %}
        </span>

        BFPlus: ${{ states('sensor.yearly_net_cost') | float(0) | round(2) }} • BF: ${{ states('sensor.yearly_business_flexi_cost') | float(0) | round(2) }}
