# =====================================================================
# Bedtime Line Sensors (Daily) — NEW PACKAGE
# Creates numeric, once-per-day sensors for clean line charts.
# Depends on your existing:
#   input_datetime.last_brush_time_andy
#   input_datetime.last_brush_time_meg
# Nothing else in your config is modified.
# =====================================================================

template:
  # Run once daily (near midnight) to take a daily snapshot.
  # You can change the time if you prefer — it’s independent of your other package.
  - trigger:
      - platform: time
        at: "23:59:50"
    sensor:
      # ANDY
      - name: "Andy Bedtime Hour (Daily)"
        unique_id: andy_bedtime_hour_daily
        icon: mdi:bed-clock
        unit_of_measurement: "hr"
        # Single numeric value suitable for a line graph (e.g., 21.75 = 9:45 PM).
        # If there was no brushing today, set to 'unknown' so the graph leaves a gap.
        state: >
          {% set dt = states('input_datetime.last_brush_time_andy') | as_datetime(default=none) %}
          {% if dt and dt.date() == now().date() %}
            {{ (dt.hour + (dt.minute / 60)) | round(2) }}
          {% else %}
            unknown
          {% endif %}
        attributes:
          # Helpful for tooltips/inspection
          source_datetime: "{{ states('input_datetime.last_brush_time_andy') }}"

      # MEG
      - name: "Meg Bedtime Hour (Daily)"
        unique_id: meg_bedtime_hour_daily
        icon: mdi:bed-clock
        unit_of_measurement: "hr"
        state: >
          {% set dt = states('input_datetime.last_brush_time_meg') | as_datetime(default=none) %}
          {% if dt and dt.date() == now().date() %}
            {{ (dt.hour + (dt.minute / 60)) | round(2) }}
          {% else %}
            unknown
          {% endif %}
        attributes:
          source_datetime: "{{ states('input_datetime.last_brush_time_meg') }}"
