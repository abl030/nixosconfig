model:
  provider: openai-codex
  base_url: https://chatgpt.com/backend-api/codex
  default: gpt-5.5
agent:
  max_turns: 150
browser:
  cloud_provider: local
  use_gateway: false
display:
  tool_progress: all
tts:
  use_gateway: false
_config_version: 32
session_reset:
  mode: none
image_gen:
  provider: openai-codex
  use_gateway: false
  model: gpt-image-2-low
platform_toolsets:
  cli:
  - browser
  - clarify
  - code_execution
  - computer_use
  - cronjob
  - delegation
  - file
  - image_gen
  - memory
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
  - mcp-nixos
known_plugin_toolsets:
  cli:
  - spotify
onboarding:
  seen:
    busy_input_prompt: true
skills:
  external_dirs:
  - /home/abl030/nixosconfig/hermes/skills
mcp_servers:
  nixos:
    command: uvx
    args:
    - mcp-nixos
    enabled: true
    timeout: 180
    connect_timeout: 60
  pfsense:
    command: /home/abl030/nixosconfig/scripts/mcp-pfsense.sh
    args: []
    enabled: true
    timeout: 300
    connect_timeout: 60
  unifi:
    command: /home/abl030/nixosconfig/scripts/mcp-unifi.sh
    args: []
    enabled: true
    timeout: 300
    connect_timeout: 60
  homeassistant:
    command: /home/abl030/nixosconfig/scripts/mcp-homeassistant.sh
    args: []
    enabled: true
    timeout: 300
    connect_timeout: 90
  playwright:
    command: /home/abl030/nixosconfig/scripts/mcp-playwright.sh
    args: []
    enabled: true
    timeout: 300
    connect_timeout: 90
  mailsearch:
    command: /home/abl030/nixosconfig/scripts/mcp-mailsearch.sh
    args: []
    enabled: false
    timeout: 300
    connect_timeout: 60
