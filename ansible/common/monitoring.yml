---
# monitoring.yml — Deploy node-exporter + Alloy to Proxmox/Debian hosts
#
# Usage:
#   ansible-playbook -i ../prom_prox/inventory.ini monitoring.yml \
#     --limit pve-new-01 \
#     -e monitoring_hostname=prom

- name: Deploy monitoring (node-exporter + Alloy)
  hosts: all
  become: true

  vars:
    monitoring_hostname: "{{ inventory_hostname }}"
    # DNS-first: Cloudflare A records for these FQDNs are owned by the
    # homelab.localProxy module on whichever NixOS host currently runs
    # homelab.services.loki (doc2 today). Moving the LGTM stack is a
    # one-deploy change on the Nix side — no playbook rerun needed.
    # See .claude/rules/nixos-service-modules.md "DNS-First Networking".
    #
    # ⚠ The trailing dot ("loki.ablz.au.") is LOAD-BEARING — do NOT remove it.
    # prom/tower carry `search ablz.au` in resolv.conf. Without the rooted
    # FQDN, a transient failure of the bare `loki.ablz.au` lookup (e.g. during
    # doc2's nightly reboot, exactly when alloy is forced to re-dial) makes Go
    # append the search domain → `loki.ablz.au.ablz.au` → the `*.ablz.au`
    # wildcard → caddy (192.168.1.6), which has no loki vhost and answers
    # 421 "Unknown host". Go pins that 421 connection forever (a 421 is a
    # valid HTTP response, so it never re-resolves DNS) → logs silently
    # dropped until a manual `systemctl restart alloy`. The trailing dot
    # disables search-suffixing, so the caddy path is structurally
    # unreachable. Full RCA (and ~3 prior misdiagnoses as "HTTP/2
    # coalescing"): docs/wiki/services/lgtm-stack.md (2026-06-19).
    loki_push_url: "https://loki.ablz.au./loki/api/v1/push"
    mimir_push_url: "https://mimir.ablz.au./api/v1/push"
    alloy_version: "1.*"

  tasks:
    # ── Node Exporter ──────────────────────────────────────
    - name: Install prometheus-node-exporter
      ansible.builtin.apt:
        name: prometheus-node-exporter
        state: present
        update_cache: true

    - name: Enable and start node-exporter
      ansible.builtin.systemd:
        name: prometheus-node-exporter
        enabled: true
        state: started

    - name: Verify node-exporter is serving metrics
      ansible.builtin.uri:
        url: http://localhost:9100/metrics
        return_content: false
        status_code: 200
      register: node_exporter_check
      retries: 3
      delay: 2

    # ── Grafana Alloy ──────────────────────────────────────
    - name: Install required packages for Grafana repo
      ansible.builtin.apt:
        name:
          - gpg
          - curl
        state: present

    - name: Add Grafana GPG key
      ansible.builtin.shell:
        cmd: >
          curl -fsSL https://apt.grafana.com/gpg.key |
          gpg --dearmor -o /etc/apt/keyrings/grafana.gpg
        creates: /etc/apt/keyrings/grafana.gpg

    - name: Add Grafana apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/grafana.list
        content: |
          deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main
        mode: "0644"

    - name: Install Alloy
      ansible.builtin.apt:
        name: alloy
        state: present
        update_cache: true

    - name: Create Alloy config directory
      ansible.builtin.file:
        path: /etc/alloy
        state: directory
        mode: "0755"

    - name: Deploy Alloy configuration
      ansible.builtin.template:
        src: templates/alloy-config.alloy.j2
        dest: /etc/alloy/config.alloy
        mode: "0644"
      notify: Restart Alloy

    - name: Configure Alloy environment defaults
      ansible.builtin.copy:
        dest: /etc/default/alloy
        content: |
          ## Managed by Ansible
          CONFIG_FILE="/etc/alloy/config.alloy"
          CUSTOM_ARGS="--server.http.listen-addr=127.0.0.1:12345 --disable-reporting"
        mode: "0644"
      notify: Restart Alloy

    - name: Enable and start Alloy
      ansible.builtin.systemd:
        name: alloy
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Restart Alloy
      ansible.builtin.systemd:
        name: alloy
        state: restarted
        daemon_reload: true
